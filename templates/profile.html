{% extends "base.html" %}

{% block content %}

<section class="profile">

    <div class="profile-header">
        <h1>{{ user.username }}</h1>
        <p>Brukerprofil</p>
    </div>

    <div class="profile-posts">

        <h2>Innlegg</h2>

        {% for post in posts %}

        <div class="post-card">
            <h3>{{ post.title }}</h3>
            <p>{{ post.content[:200] }}...</p>
        </div>

        {% else %}

        <p>Ingen innlegg ennå.</p>

        {% endfor %}

    </div>

</section>

{% endblock %}
