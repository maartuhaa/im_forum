{% extends "base.html" %}

{% block content %}

<div class="themes-page">

    <div class="themes-header">
        <h1>Temaer</h1>
        <p>Utforsk innlegg etter tema</p>
    </div>

    <div class="themes-grid">

        {% for theme in themes %}

        <a href="/theme/{{ theme.id }}" class="theme-card">

            <div class="theme-name">
                {{ theme.name }}
            </div>

            <div class="theme-count">
                {{ theme.post_count }} innlegg
            </div>

        </a>

        {% endfor %}

    </div>

</div>

{% endblock %}
